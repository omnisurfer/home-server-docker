# debug Whoami
services:  
  # BACKEND 1 (e.g., a simple web app)
  app1:
    image: containous/whoami  # Replace with your actual app (shows IP/host)
    restart: unless-stopped
    networks:
      - traefik-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app1.rule=Host(`app1.${SERVER_DOMAIN}`)"  # ← CHANGE HOST
      - "traefik.http.routers.app1.entrypoints=websecure"
      # - "traefik.http.routers.app1.tls.certresolver=myresolver"   # Uses ACME resolver above
      - "traefik.http.services.app1.loadbalancer.server.port=80"  # ← BACKEND PORT

  # BACKEND 2 (e.g., API service)
  app2:
    image: containous/whoami
    restart: unless-stopped
    networks:
      - traefik-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app2.rule=Host(`app2.${SERVER_DOMAIN}`)"  # ← CHANGE HOST
      - "traefik.http.routers.app2.entrypoints=websecure"
      # - "traefik.http.routers.app2.tls.certresolver=myresolver"
      - "traefik.http.services.app2.loadbalancer.server.port=80"

  # BACKEND 3 (e.g., admin panel)
  app3:
    image: containous/whoami
    restart: unless-stopped
    networks:
      - traefik-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app3.rule=Host(`app3.${SERVER_DOMAIN}`)"  # ← CHANGE HOST
      - "traefik.http.routers.app3.entrypoints=websecure"
      # - "traefik.http.routers.app3.tls.certresolver=myresolver"
      - "traefik.http.services.app3.loadbalancer.server.port=80"
