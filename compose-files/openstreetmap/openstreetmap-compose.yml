# https://github.com/Overv/openstreetmap-tile-server/tree/master

services:
  map:
    image: overv/openstreetmap-tile-server
    restart: unless-stopped
    networks:
      - traefik-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.openstreetmap.rule=Host(`openstreetmap.${SERVER_DOMAIN}`)"  # ← CHANGE HOST
      - "traefik.http.routers.openstreetmap.entrypoints=websecure"
      # - "traefik.http.routers.openstreetmap.tls.certresolver=myresolver"   # Uses ACME resolver above
      - "traefik.http.services.openstreetmap.loadbalancer.server.port=80"  # ← BACKEND PORT
    # docker volume create osm-data
    volumes:
      - osm-data:/data/database/
    command: "run"

volumes:
  osm-data:
    external: true